services:
  api:
    build:
      context: .
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    environment:
      - LOG_LEVEL=INFO
    command: uvicorn src.main:create_app --factory --host 0.0.0.0 --port 8000 --reload

  ingest:
    build:
      context: .
      target: dev
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    command: python -m src.cli ingest

  test:
    build:
      context: .
      target: dev
    volumes:
      - ./data:/app/data
      - ./tests:/app/tests
      - ./src:/app/src
    command: pytest tests/ -v
